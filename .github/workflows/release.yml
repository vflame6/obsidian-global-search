name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package zip
        run: |
          mkdir -p dist
          cp main.js manifest.json styles.css dist/
          cd dist
          zip "global-search-${GITHUB_REF_NAME}.zip" main.js manifest.json styles.css

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
            dist/global-search-${{ github.ref_name }}.zip
